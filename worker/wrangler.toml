name = "keyscope-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "keyscope-db"
database_id = "a8e5bc81-59ff-4cea-8a8a-d0be6d4737eb"

[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://keyscope.pages.dev"
HF_SPACES_URL = "https://REPLACE-WITH-YOUR-HF-SPACE.hf.space"
# Stripe Price IDs (kein Secret – darf hier stehen)
STRIPE_PRICE_ID         = "price_1THsunEC9c8leIGWHkmXcPWh"
# Yearly price = 10x monthly (e.g. €89.88/yr ≈ €7.49/mo). Add in Stripe Dashboard, then replace:
STRIPE_PRICE_ID_YEARLY  = "price_1TJ0dVEC9c8leIGWJzCi2gRt"

# Secrets (per wrangler secret put):
# STRIPE_SECRET_KEY      – sk_live_... oder sk_test_...
# STRIPE_WEBHOOK_SECRET  – whsec_...

[dev]
port = 8787
local_protocol = "http"
